<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
    content="width=device-width, initial-scale=1.0">
   
    <link rel="stylesheet" href="./css/style.css">

    <link rel="shortcut icon" href="./imagens/favicon-16x16.png" type="image/x-icon"> 

    <title>Pokedex</title>
</head>
<body>

    <main>
            <img class="pokemon_imagem" src="https://66.media.tumblr.com/tumblr_ma4fsg8aDZ1rfjowdo1_500.gif" alt="pokemon_imagem">

            <h1 class="pokemon_data">

            <form class="form">

                class="input_search"
                placeholder="name or number"
                required>
            </form>

    </main>

</html>
